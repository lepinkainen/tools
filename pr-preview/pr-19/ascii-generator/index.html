<html lang="en">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet" href="../static/common.css" />

  </head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;
const CHAR_SETS = {
standard: " .:-=+*#%@",
detailed: " .'`^,:;Il!i><~+_-?][}{1)(|tfjrxnuvczXYUJCLQ0OZmwqpdbkhao*#MW&8%B@$",
blocks: " \u2591\u2592\u2593\u2588",
minimal: " .oO@",
binary: " \u2588",
dots: " \u2801\u2803\u2807\u2847\u2877\u287F\u28FF",
custom: null,
};
const THEMES = {
terminal: { bg: "#0a0a0a", fg: "#00ff41", name: "Terminal Green" },
amber: { bg: "#1a0f00", fg: "#ffb000", name: "Amber CRT" },
white: { bg: "#0d0d0d", fg: "#e0e0e0", name: "White on Black" },
inverse: { bg: "#f0f0f0", fg: "#111111", name: "Black on White" },
blue: { bg: "#000820", fg: "#4fc3f7", name: "Ice Blue" },
pink: { bg: "#1a000d", fg: "#ff69b4", name: "Hot Pink" },
color: { bg: "#0a0a0a", fg: null, name: "Full Color" },
};
const CA = 0.55;
function App() {
const [imageSrc, setImageSrc] = useState(null);
const [imgNat, setImgNat] = useState({w:1,h:1});
const [ascii, setAscii] = useState(null);
const [error, setError] = useState(null);
const [customChars, setCustomChars] = useState(" .:-=+*#%@");
const [settings, setSettings] = useState({
width: 120, charSet: "standard", theme: "terminal",
invert: false, contrast: 1.0, brightness: 0,
  });
const [dragOver, setDragOver] = useState(false);
const [processing, setProcessing] = useState(false);
const [showExport, setShowExport] = useState(false);
const [expW, setExpW] = useState(1024);
const [expH, setExpH] = useState(1024);
const [expLock, setExpLock] = useState(true);
const [expImg, setExpImg] = useState(null);
const [crop, setCrop] = useState(null);
const [showCrop, setShowCrop] = useState(false);
const [cropDraft, setCropDraft] = useState(null);
const cropRef = useRef(null);
const getAspect = useCallback(() => {
if (!ascii || !ascii.length) return 1;
return ascii[0].length / (ascii.length / CA);
  }, [ascii]);
const process = useCallback((src, s, cropArea) => {
return new Promise((resolve, reject) => {
const img = new Image();
img.onload = () => {
try {
const c = document.createElement("canvas");
const ctx = c.getContext("2d");
let sx=0, sy=0, sw=img.width, sh=img.height;
if (cropArea) {
sx = Math.round(cropArea.x * img.width);
sy = Math.round(cropArea.y * img.height);
sw = Math.round(cropArea.w * img.width);
sh = Math.round(cropArea.h * img.height);
          }
const w = s.width;
const h = Math.round((sh / sw) * w * CA);
c.width = w; c.height = h;
ctx.drawImage(img, sx, sy, sw, sh, 0, 0, w, h);
const d = ctx.getImageData(0, 0, w, h).data;
const ch = s.charSet === "custom" ? (s.cc && s.cc.length >= 2 ? s.cc : " @") : CHAR_SETS[s.charSet];
const isC = s.theme === "color";
const lines = [];
for (let y = 0; y < h; y++) {
const line = [];
for (let x = 0; x < w; x++) {
const i = (y * w + x) * 4;
let r = Math.min(255, Math.max(0, (d[i] + s.brightness) * s.contrast));
let g = Math.min(255, Math.max(0, (d[i+1] + s.brightness) * s.contrast));
let b = Math.min(255, Math.max(0, (d[i+2] + s.brightness) * s.contrast));
const gr = 0.299*r + 0.587*g + 0.114*b;
let idx = Math.round((gr/255) * (ch.length-1));
if (s.invert) idx = ch.length - 1 - idx;
const chr = ch[idx];
if (isC && chr !== " ") line.push({ch:chr, color:"rgb("+Math.round(r)+","+Math.round(g)+","+Math.round(b)+")"});
else line.push({ch:chr, color:null});
            }
lines.push(line);
          }
resolve(lines);
        } catch(e) { reject(e); }
      };
img.onerror = () => reject(new Error("Load failed"));
img.src = src;
    });
  }, []);
useEffect(() => {
if (!imageSrc) return;
let x = false;
setProcessing(true); setError(null);
process(imageSrc, {...settings, cc: customChars}, crop)
      .then(r => { if(!x){setAscii(r);setProcessing(false);} })
      .catch(e => { if(!x){setError(e.message);setProcessing(false);} });
return () => { x = true; };
  }, [imageSrc, settings, customChars, crop, process]);
const handleFile = (f) => {

  };

e.preventDefault(); e.stopPropagation();
if (!cropRef.current) return;
const box = cropRef.current.getBoundingClientRect();
const startX = (e.clientX - box.left) / box.width;
const startY = (e.clientY - box.top) / box.height;
const startCrop = {...cropDraft};
const onMove = (ev) => {
const nx = (ev.clientX - box.left) / box.width;
const ny = (ev.clientY - box.top) / box.height;
const dx = nx - startX, dy = ny - startY;
let next = {...startCrop};
if (handle === "move") {
next.x = Math.max(0, Math.min(1 - next.w, startCrop.x + dx));
next.y = Math.max(0, Math.min(1 - next.h, startCrop.y + dy));
      } else if (handle === "new") {
next.x = Math.max(0, Math.min(startX, nx));
next.y = Math.max(0, Math.min(startY, ny));
next.w = Math.min(1 - next.x, Math.abs(nx - startX));
next.h = Math.min(1 - next.y, Math.abs(ny - startY));
      } else {
if (handle.includes("l")) { const nX = Math.max(0, Math.min(startCrop.x+startCrop.w-0.02, startCrop.x+dx)); next.w = startCrop.w-(nX-startCrop.x); next.x = nX; }
if (handle.includes("r")) { next.w = Math.max(0.02, Math.min(1-startCrop.x, startCrop.w+dx)); }
if (handle.includes("t")) { const nY = Math.max(0, Math.min(startCrop.y+startCrop.h-0.02, startCrop.y+dy)); next.h = startCrop.h-(nY-startCrop.y); next.y = nY; }
if (handle.includes("b")) { next.h = Math.max(0.02, Math.min(1-startCrop.y, startCrop.h+dy)); }
      }
setCropDraft(next);
    };
const onUp = () => { window.removeEventListener("mousemove",onMove); window.removeEventListener("mouseup",onUp); };
window.addEventListener("mousemove",onMove);
window.addEventListener("mouseup",onUp);
  };
const applyCrop = () => {
if (cropDraft && cropDraft.w > 0.01 && cropDraft.h > 0.01) setCrop(cropDraft);
setShowCrop(false);
  };
const resetCrop = () => { setCrop(null); setCropDraft(null); setShowCrop(false); };
const renderExp = useCallback(() => {
if (!ascii || !ascii.length) return;
requestAnimationFrame(() => {
try {
const cv = document.createElement("canvas");
cv.width = expW; cv.height = expH;
const ctx = cv.getContext("2d");
const t = THEMES[settings.theme];
ctx.fillStyle = t.bg; ctx.fillRect(0, 0, cv.width, cv.height);
const rows = ascii.length, cols = ascii[0].length;
const cW = cv.width/cols, cH = cv.height/rows;
const fz = Math.min(cW*1.6, cH*0.95);
ctx.font = fz+'px "Courier New",monospace';
ctx.textAlign = "center"; ctx.textBaseline = "middle";
for (let y=0;y<rows;y++) for(let x=0;x<cols;x++){
const c=ascii[y][x]; if(c.ch===" ")continue;
ctx.fillStyle=(settings.theme==="color"&&c.color)?c.color:(t.fg||"#e0e0e0");
ctx.fillText(c.ch, x*cW+cW/2, y*cH+cH/2);
        }
setExpImg(cv.toDataURL("image/png"));
      } catch(e) { console.error(e); }
    });
  }, [ascii, expW, expH, settings.theme]);
useEffect(() => {
if (!showExport) { setExpImg(null); return; }
if (!ascii) return;
const t = setTimeout(() => renderExp(), 80);
return () => clearTimeout(t);
  }, [showExport, expW, expH, ascii, settings.theme, renderExp]);
const setExpWidth = (w) => { setExpW(w); if (expLock && ascii && ascii.length) setExpH(Math.round(w / getAspect())); };
const setExpHeight = (h) => { setExpH(h); if (expLock && ascii && ascii.length) setExpW(Math.round(h * getAspect())); };
const setRatioExp = (bw) => { setExpW(bw); setExpH(Math.round(bw / getAspect())); };

const fs = settings.width>160?5:settings.width>100?7:settings.width>60?9:12;
const rp = (ascii && ascii.length) ? [512,1024,1920].map(w=>({w, h:Math.round(w/getAspect())})) : [];

      ].join("\n")}</style>
{showCrop && imageSrc && (

{cropDraft && (<>

<div style={{position:"absolute",top:(cropDraft.y*100)+"%",left:0,width:(cropDraft.x*100)+"%",height:(cropDraft.h*100)+"%",background:"rgba(0,0,0,0.6)"}}/>

{Math.round(cropDraft.w*imgNat.w)+" x "+Math.round(cropDraft.h*imgNat.h)+" px"}
</div>
</div>
</>)}
</div>

</div>
</div>
      )}
<div style={{padding:"24px 32px",borderBottom:"1px solid #27272a",display:"flex",alignItems:"center",justifyContent:"space-between",background:"linear-gradient(180deg,#0f0f12,#09090b)"}}>
<div style={{display:"flex",alignItems:"center",gap:14}}>

<div>
<div style={{fontSize:16,fontWeight:700,letterSpacing:"-0.02em",fontFamily:"'Space Grotesk',sans-serif"}}>ASCII Generator</div>
<div style={{fontSize:11,color:"#71717a",marginTop:1}}>Image to Text Art</div>
</div>

{ascii&&(

</div>
        )}
</div>
{showExport&&ascii&&(

{[256,512,1024,2048].map(s=><button key={s} onClick={()=>{setExpW(s);setExpH(s)}} style={pb(expW===s&&expH===s,"#a78bfa")}>{s>=1024?(s/1024)+"K":s}</button>)}

onClick={()=>{const i=document.createElement("input");i.type="file";i.accept="image/*";i.onchange=e=>handleFile(e.target.files[0]);i.click()}}
style={{border:"2px dashed "+(dragOver?"#a78bfa":"#3f3f46"),borderRadius:10,padding:"28px 16px",textAlign:"center",cursor:"pointer",background:dragOver?"rgba(167,139,250,.05)":"transparent",transition:"all .3s"}}>
{imageSrc?<img src={imageSrc} alt="preview" style={{maxWidth:"100%",maxHeight:100,borderRadius:6,display:"block",margin:"0 auto 8px"}}/>:<div style={{fontSize:28,marginBottom:8}}>{"\uD83D\uDCC1"}</div>}
<div style={{fontSize:12,color:"#a1a1aa",fontWeight:500}}>{imageSrc?"Replace Image":"Drop image or click"}</div>
<div style={{fontSize:10,color:"#52525b",marginTop:4}}>PNG, JPG, GIF, WebP</div>
</div>
{imageSrc && (
<div style={{display:"flex",gap:8}}>
<button onClick={e=>{e.stopPropagation();openCrop()}} className="hb" style={{flex:1,padding:"8px 12px",borderRadius:6,border:crop?"1px solid #22c55e":"1px solid #3f3f46",background:crop?"rgba(34,197,94,0.1)":"#18181b",color:crop?"#22c55e":"#a1a1aa",fontSize:12,fontFamily:"inherit",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",gap:6}}>
{crop ? ("Cropped "+Math.round(crop.w*imgNat.w)+"x"+Math.round(crop.h*imgNat.h)) : "Crop"}
</button>
{crop && <button onClick={e=>{e.stopPropagation();resetCrop()}} style={{padding:"8px 12px",borderRadius:6,border:"1px solid #3f3f46",background:"#18181b",color:"#71717a",fontSize:12,fontFamily:"inherit",cursor:"pointer"}} title="Remove crop">Reset</button>}
</div>
          )}
<div>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><label style={lbl}>Width</label><span style={val2}>{settings.width} chars</span></div>
<input type="range" min={30} max={250} value={settings.width} onChange={e=>setSettings(s=>({...s,width:+e.target.value}))}/>
</div>
<div>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><label style={lbl}>Contrast</label><span style={val2}>{settings.contrast.toFixed(1)}x</span></div>
<input type="range" min={0.2} max={3} step={0.1} value={settings.contrast} onChange={e=>setSettings(s=>({...s,contrast:+e.target.value}))}/>
</div>
<div>
<div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><label style={lbl}>Brightness</label><span style={val2}>{settings.brightness}</span></div>
<input type="range" min={-100} max={100} step={5} value={settings.brightness} onChange={e=>setSettings(s=>({...s,brightness:+e.target.value}))}/>
</div>
<div onClick={()=>setSettings(s=>({...s,invert:!s.invert}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px",background:"#18181b",borderRadius:8,cursor:"pointer"}}>
<span style={{fontSize:12,color:"#a1a1aa"}}>Invert Characters</span>
<div style={{width:36,height:20,borderRadius:10,background:settings.invert?"#a78bfa":"#3f3f46",position:"relative",transition:"background .2s"}}>
<div style={{width:16,height:16,borderRadius:"50%",background:"#fff",position:"absolute",top:2,left:settings.invert?18:2,transition:"left .2s"}}/>
</div>
</div>
<div>
<label style={{...lbl,display:"block",marginBottom:8}}>Character Set</label>
<div style={{display:"flex",flexDirection:"column",gap:4}}>
{Object.entries(CHAR_SETS).filter(([k])=>k!=="custom").map(([key,v])=>(
<div key={key} className={"cb "+(settings.charSet===key?"a":"")} onClick={()=>setSettings(s=>({...s,charSet:key}))}
style={{padding:"8px 12px",borderRadius:6,fontSize:11,background:settings.charSet===key?undefined:"transparent",color:settings.charSet===key?undefined:"#a1a1aa",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{textTransform:"capitalize",fontWeight:500}}>{key}</span>
<span style={{fontSize:9,opacity:.6,fontFamily:"monospace",maxWidth:100,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v.slice(0,12)}</span>
</div>
              ))}
<div className={"cb "+(settings.charSet==="custom"?"a":"")} onClick={()=>setSettings(s=>({...s,charSet:"custom"}))}
style={{padding:"8px 12px",borderRadius:6,fontSize:11,background:settings.charSet==="custom"?undefined:"transparent",color:settings.charSet==="custom"?undefined:"#a1a1aa",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<span style={{fontWeight:500}}>Custom</span>
<span style={{fontSize:9,opacity:.6}}>{customChars.length} chars</span>
</div>
</div>
{settings.charSet==="custom"&&(
<div style={{marginTop:8}}>
<div style={{fontSize:10,color:"#52525b",marginBottom:6}}>Light to dark (first = brightest)</div>
<textarea value={customChars} onChange={e=>setCustomChars(e.target.value)} onClick={e=>e.stopPropagation()} spellCheck={false}
style={{width:"100%",minHeight:56,padding:"10px 12px",borderRadius:6,border:"1px solid "+(customChars.length<2?"#ef4444":"#3f3f46"),background:"#18181b",color:"#e4e4e7",fontSize:13,fontFamily:"'JetBrains Mono',monospace",letterSpacing:".1em",resize:"vertical",outline:"none"}}
onFocus={e=>{e.target.style.borderColor="#a78bfa"}} onBlur={e=>{e.target.style.borderColor=customChars.length<2?"#ef4444":"#3f3f46"}}/>
{customChars.length<2&&<div style={{fontSize:10,color:"#ef4444",marginTop:4}}>Need at least 2 characters</div>}
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:6}}>
<span style={{fontSize:10,color:"#52525b"}}>{customChars.length} chars</span>
<div style={{display:"flex",gap:4}}>
<button onClick={()=>setCustomChars(" "+customChars.trim().split("").reverse().join(""))} style={{padding:"3px 8px",borderRadius:4,border:"1px solid #27272a",background:"#18181b",color:"#71717a",fontSize:10,fontFamily:"inherit",cursor:"pointer"}}>Reverse</button>
<button onClick={()=>setCustomChars([...new Set(customChars.split(""))].join(""))} style={{padding:"3px 8px",borderRadius:4,border:"1px solid #27272a",background:"#18181b",color:"#71717a",fontSize:10,fontFamily:"inherit",cursor:"pointer"}}>Dedupe</button>
</div>
</div>
</div>
            )}
</div>
<div>
<label style={{...lbl,display:"block",marginBottom:10}}>Color Theme</label>
<div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:6}}>
{Object.entries(THEMES).map(([key,t])=>(
<div key={key} className={"tb "+(settings.theme===key?"a":"")} onClick={()=>setSettings(s=>({...s,theme:key}))} title={t.name}
style={{width:"100%",aspectRatio:"1",borderRadius:8,background:key==="color"?"conic-gradient(#f00,#ff0,#0f0,#0ff,#00f,#f0f,#f00)":t.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,fontWeight:700,color:t.fg||"#fff"}}>
{key==="color"?"\u25C6":"A"}
</div>
              ))}
</div>
</div>
</div>
<div style={{flex:1,overflow:"auto",position:"relative"}}>
{error?(
<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#ef4444",gap:8}}>
<div style={{fontSize:32}}>{"\u26A0"}</div><div style={{fontSize:14}}>{error}</div>
</div>
          ):!imageSrc?(
<div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100%",color:"#3f3f46",gap:12}}>
<div style={{fontSize:64}}>{"\u25C8"}</div>
<div style={{fontSize:14,fontFamily:"'Space Grotesk',sans-serif",fontWeight:600}}>Upload an image to begin</div>
<div style={{fontSize:12,color:"#27272a"}}>Converted to ASCII art in real-time</div>
</div>
          ):processing?(
<div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100%",color:"#71717a",fontSize:14}}>Processing...</div>
          ):ascii?(
<div style={{background:theme.bg,minHeight:"100%",padding:16,position:"relative",overflow:"auto"}}>
<div className="sl"/>
<pre style={{fontSize:fs,lineHeight:1.1,fontFamily:"'JetBrains Mono','Courier New',monospace",whiteSpace:"pre",color:theme.fg||"#e0e0e0",margin:0}}>
{ascii.map((line,y)=>(
<div key={y} style={{height:fs*1.1+"px"}}>
{settings.theme==="color"?line.map((c,x)=>c.color?<span key={x} style={{color:c.color}}>{c.ch}</span>:<span key={x}>{c.ch}</span>):line.map(c=>c.ch).join("")}
</div>
                ))}
</pre>
</div>
          ):null}
</div>
</div>
</div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
