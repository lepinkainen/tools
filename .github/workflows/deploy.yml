name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build site
        run: python build.py

      - name: Deploy to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          # Clone gh-pages branch, or initialize it if it doesn't exist
          if git clone --branch gh-pages --single-branch https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git gh-pages-temp; then
            echo "Cloned existing gh-pages branch"
          else
            echo "Creating new gh-pages branch"
            mkdir gh-pages-temp
            cd gh-pages-temp
            git init
            git remote add origin https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git
            git checkout -b gh-pages
            cd ..
          fi

          # Preserve any existing PR previews
          if [ -d "gh-pages-temp/pr-preview" ]; then
            cp -r gh-pages-temp/pr-preview /tmp/pr-preview-backup
          fi

          # Clear gh-pages content (preserving .git)
          find gh-pages-temp -mindepth 1 -maxdepth 1 ! -name '.git' -exec rm -rf {} +

          # Copy freshly built site
          cp -r dist/. gh-pages-temp/

          # Restore PR previews
          if [ -d "/tmp/pr-preview-backup" ]; then
            mkdir -p gh-pages-temp/pr-preview
            cp -r /tmp/pr-preview-backup/. gh-pages-temp/pr-preview/
          fi

          # Commit and push
          cd gh-pages-temp
          git add .
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Deploy main branch to GitHub Pages"
            git push origin gh-pages
          fi
